databaseChangeLog:

  # Bootstrap: create database and orders table so this example is self-contained
  - changeSet:
      id: rollback-yaml-demo-0a
      author: dbdevopsuser01
      comment: Create database
      changes:
        - sql:
            sql: CREATE DATABASE IF NOT EXISTS demo_rollback_yaml;
      rollback:
        - sql:
            sql: DROP DATABASE IF EXISTS demo_rollback_yaml;

  - changeSet:
      id: rollback-yaml-demo-0b
      author: dbdevopsuser01
      comment: Create orders table
      changes:
        - createTable:
            tableName: orders
            schemaName: demo_rollback_yaml
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: order_date
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: total_amount
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP

  # Good change 1: create discount_codes table
  # Rollback auto-generated by Liquibase: dropTable discount_codes
  - changeSet:
      id: rollback-yaml-demo-1
      author: dbdevopsuser01
      comment: Create discount_codes table
      changes:
        - createTable:
            tableName: discount_codes
            schemaName: demo_rollback_yaml
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: discount_percent
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false
              - column:
                  name: valid_from
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: valid_until
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

  # Good change 2: add discount_code_id FK column to orders
  # Rollback auto-generated by Liquibase: dropColumn discount_code_id
  - changeSet:
      id: rollback-yaml-demo-2
      author: dbdevopsuser01
      comment: Add discount_code_id FK column to orders table
      changes:
        - addColumn:
            tableName: orders
            schemaName: demo_rollback_yaml
            columns:
              - column:
                  name: discount_code_id
                  type: BIGINT
        - addForeignKeyConstraint:
            baseTableSchemaName: demo_rollback_yaml
            baseTableName: orders
            baseColumnNames: discount_code_id
            constraintName: fk_orders_discount
            referencedTableSchemaName: demo_rollback_yaml
            referencedTableName: discount_codes
            referencedColumnNames: id

  # BAD CHANGE: removes NOT NULL + DEFAULT 'PENDING' from orders.status
  # Liquibase cannot auto-generate rollback for modifyDataType — explicit rollback defined
  - changeSet:
      id: rollback-yaml-demo-3
      author: dbdevopsuser01
      comment: "[BAD CHANGE] Remove NOT NULL and default from orders.status — breaks app logic"
      changes:
        - modifyDataType:
            tableName: orders
            schemaName: demo_rollback_yaml
            columnName: status
            newDataType: VARCHAR(50)
      rollback:
        - modifyDataType:
            tableName: orders
            schemaName: demo_rollback_yaml
            columnName: status
            newDataType: VARCHAR(50) NOT NULL DEFAULT 'PENDING'
